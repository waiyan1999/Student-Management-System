<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title> </title>

<head th:replace="~{fragment/css :: css}"></head>


</head>
<body>

<div th:replace="~{fragment/header :: header}"></div>

<div class="container mt-5"> 
<div class="row justify-content-center"> 
<div class="col-md-8"> <div class="card shadow"> 
<div class="card-header text-center"> 
<h3>Student Registration</h3> 
<h4>Create your Student Account</h4>
</div>
 <div class="card-body">


<form th:action="@{/student/register}" th:object="${userObj}"
 method="post" 
enctype="multipart/form-data">


<br>
 <!-- Name --> 
 <div class="mb-3">
 <label class="form-label">Full Name*</label>
 
  <input type="text" th:field="*{name}"placeholder="Enter your full name" class="form-control"> 
   
  <small class="text-danger" th:errors="*{name}"></small>
 </div> 
   
   <!-- Email -->
    <div class="mb-3">
     <label class="form-label">Email*</label> 
     <input type="email" th:field="*{email}"placeholder="example@gmail.com" class="form-control">
    
      <small class="text-danger" th:errors="*{email}"></small>
      
       </div> 
       
       <!-- Password -->
        <div class="mb-3"> 
        <label class="form-label">Password*</label> 
        <input type="password" th:field="*{password}"placeholder="Enter password" class="form-control">
         <small class="text-muted">
Password must contain at least 6 characters.
</small><br>
<small class="text-muted">
Contain one letter and one number.
</small><br>
         <small class="text-danger" th:errors="*{password}"></small>
          </div>
          
          <!-- Phone Number --> <div class="mb-3">
           <label class="form-label">Phone Number*</label>
           <input type="text" th:field="*{phoneNumber}" placeholder="09xxxxxxxxx"class="form-control">
            <small class="text-muted">
Must start with 09 (e.g., 09123456789)
</small><br>
            <small class="text-danger" th:errors="*{phoneNumber}"></small> 
            </div>
            
             <!-- Address -->
              <div class="mb-3"> 
              <label class="form-label">Address*</label>
               <textarea th:field="*{address}"placeholder="Enter your address" class="form-control" rows="3"></textarea> 
             
               <small class="text-danger" th:errors="*{address}"></small>
                </div> 
                
                <!-- Date of Birth -->
                 <div class="mb-3"> <label class="form-label"> Date of Birth
                 *</label> 
                 <input type="date" th:field="*{dob}" class="form-control"> 
                 <small class="text-muted">
You must be at least 16 years old.
</small><br>
                 <small class="text-danger" th:errors="*{dob}"></small> 
                 </div> 
                 
                 <!-- Gender -->
                <div class="mb-3">
                    <label class="form-label">
                        Gender *
                    </label>
                    <br>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input"
                               type="radio"
                               th:field="*{gender}"
                               value="Male">

                        <label class="form-check-label">
                            Male
                        </label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input"
                               type="radio"
                               th:field="*{gender}"
                               value="Female" >

                        <label class="form-check-label">
                            Female
                        </label>
                    </div>
               <small class="text-danger" th:errors="*{gender}"></small>
                    </div>
                    
                    <!-- PHOTO -->
             <div class="mb-3">
             <label class="form-label">Profile Photo</label>
            <input type="file" name="photo" class="form-control" accept="image/*">
           <small class="text-muted">Allowed formats: JPG, JPEG, PNG</small><br>
            <small class="text-danger" th:errors="*{filePath}"></small>
        </div>
        
        <!-- Terms -->
                <div class="form-check mb-4">
                    <input class="form-check-input"
                           type="checkbox"
                           required>

                    <label class="form-check-label">
                        I agree to the Terms & Conditions
                    </label>
                </div>
                
                     <div class="d-grid">
                      <button type="submit" class="btn btn-primary"> Register </button> 
                      </div>
                      
                      
                       <div class="text-center mt-4"> Already have an account?
                       
 <a th:href="@{/login}">Sign In </a>
                           </div> 
                                 </form> 
                               </div> 
                             </div> 
                          </div> 
                        </div> 
                     </div>
                    
                     <div th:replace="~{fragment/footer :: footer}"></div>

   <div th:replace="~{fragment/js :: js}"></div>
   
</body>
</html>
