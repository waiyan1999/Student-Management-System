<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ace Inspiration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .ace-logo {
            font-size: 1.5rem;
            color: #0d6efd;
        }

        .ace-text {
            font-weight: 700;
            font-size: 1rem;
        }

        .ace-subtext {
            font-size: 0.75rem;
            color: gray;
        }

        .search-pill {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .search-pill input {
            padding-left: 2rem;
        }

        .search-pill i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: gray;
        }

        .category-menu {
            width: 350px;
        }
    </style>
</head>

<body>

<!-- STUDENT SIDEBAR FRAGMENT -->
<div class="d-flex" th:fragment="studentSidebar">

    <!-- SIDEBAR -->
    <aside class="bg-white border-end vh-100 position-sticky top-0" style="width: 280px;">

        <!-- PROFILE SECTION -->
        <div class="p-4 border-bottom text-center">

            <i class="bi bi-person-circle fs-1 text-primary"></i>

            <h5 th:text="${session.loginUser?.name}" class="mt-2 mb-0"></h5>


            <small class="text-muted">Student Portal</small>

        </div>

        <!-- NAVIGATION -->
        <nav class="p-3">

            <div class="nav flex-column gap-2">

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded bg-light">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-book"></i>
                    My Courses
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-journal-text"></i>
                    Assignments
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-calendar-check"></i>
                    Attendance
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-file-earmark-text"></i>
                    Exams
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-bar-chart"></i>
                    Grades
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-award"></i>
                    Certificates
                </a>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-dark p-2 rounded">
                    <i class="bi bi-chat-left-text"></i>
                    Feedback
                </a>

                <hr>

                <a href="#"
                   class="nav-link d-flex align-items-center gap-2 text-danger p-2 rounded">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </a>

            </div>

        </nav>

    </aside>

    <!-- CONTENT AREA (placeholder for now) -->
    

</div>

<!-- ================= HEADER FRAGMENT ================= -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
