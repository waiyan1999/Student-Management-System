<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <th:block th:replace="~{fragment/css :: css}"></th:block>
</head>
<body>

<div th:replace="~{fragment/header :: header}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h3>Forgot Password</h3>
                </div>
                <div class="card-body">

                    <form th:action="@{/forgot-password}" method="post">

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>New Password</label>
                            <input type="password" name="newPassword" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Reset Password</button>

                    </form>

                    <p class="text-success mt-3" th:if="${message}" th:text="${message}"></p>
                    <p class="text-danger mt-3" th:if="${error}" th:text="${error}"></p>

                    <a th:href="@{/login}">Back to Login</a>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragment/footer :: footer}"></div>

</body>
</html>
