<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ace Inspiration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .ace-logo {
            font-size: 1.5rem;
            color: #0d6efd;
        }

        .ace-text {
            font-weight: 700;
            font-size: 1rem;
        }

        .ace-subtext {
            font-size: 0.75rem;
            color: gray;
        }

        .search-pill {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .search-pill input {
            padding-left: 2rem;
        }

        .search-pill i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: gray;
        }

        .category-menu {
            width: 350px;
        }
    </style>
</head>

<body>

<!-- ================= HEADER FRAGMENT ================= -->
<header th:fragment="studentHeader">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container-xxl">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold"
               th:href="@{/student/portal}">
                <span class="ace-logo">
                    <i class="bi bi-mortarboard-fill"></i>
                </span>

                <div class="d-flex flex-column lh-1">
                    <span class="ace-text">ACE</span>
                    <small class="ace-subtext">Student Portal</small>
                </div>
            </a>

            <!-- TOGGLER -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#studentNav">

                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- NAVBAR -->
            <div class="collapse navbar-collapse" id="studentNav">

                <!-- Left -->
                <ul class="navbar-nav ms-lg-4">
						
					<li class="nav-item">
                        <a class="nav-link"
                           th:href="@{/}">
                           Home
                        </a>
                    </li>	
                    

                    <li class="nav-item">
                        <a class="nav-link"
                           th:href="@{/student/courses}">
                            My Courses
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           th:href="@{/student/announcements}">
                            Announcements
                        </a>
                    </li>

                </ul>

                <!-- Right -->
                <div class="ms-auto d-flex align-items-center gap-3">

                    <span class="fw-semibold">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${student.name}"> 
                            Student Name
                        </span>
                    </span>

                    <a class="btn btn-outline-danger"
                       th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Logout
                    </a>

                </div>

            </div>

        </div>
    </nav>
</header>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
