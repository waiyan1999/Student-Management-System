<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ace Inspiration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .ace-logo {
            font-size: 1.5rem;
            color: #0d6efd;
        }

        .ace-text {
            font-weight: 700;
            font-size: 1rem;
        }

        .ace-subtext {
            font-size: 0.75rem;
            color: gray;
        }

        .search-pill {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .search-pill input {
            padding-left: 2rem;
        }

        .search-pill i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: gray;
        }

        .category-menu {
            width: 350px;
        }
    </style>
</head>

<body>

<!-- ================= HEADER FRAGMENT ================= -->
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container-xxl">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" th:href="@{/}">
                <span class="ace-logo">
                    <i class="bi bi-mortarboard-fill"></i>
                </span>
                <div class="d-flex flex-column lh-1">
                    <span class="ace-text">ACE</span>
                    <small class="ace-subtext">Inspiration</small>
                </div>
            </a>

            <!-- TOGGLER -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- NAVBAR CONTENT -->
            <div class="collapse navbar-collapse" id="mainNav">

                <!-- LEFT MENU -->
                <ul class="navbar-nav ms-lg-4 me-lg-3 mb-3 mb-lg-0">

                    <!-- CATEGORY DROPDOWN -->
                    <li class="nav-item dropdown">
                        <button class="nav-link dropdown-toggle btn btn-link"
                                data-bs-toggle="dropdown">
                            Categories
                        </button>

                        <div class="dropdown-menu category-menu p-3">

                            <!-- Dynamic Categories -->
                            <div th:if="${not #lists.isEmpty(allCategories)}"
                                 class="row row-cols-2 g-2">

                                <div th:each="cat : ${allCategories}" class="col">
                                    <a class="dropdown-item rounded"
                                       th:href="@{/courses/by-category/{id}(id=${cat.id})}"
                                       th:text="${cat.name}">
                                    </a>
                                </div>

                            </div>

                            <!-- Empty State -->
                            <div th:if="${#lists.isEmpty(allCategories)}"
                                 class="text-center text-muted py-2">
                                No categories available
                            </div>

                        </div>
                    </li>

                    <!-- LINKS -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/courses/show}">Courses</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#programs">Programs</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#career-paths">Career Paths</a>
                    </li>

                </ul>

                <!-- SEARCH -->
                <form class="search-pill d-flex flex-grow-1 mb-3 mb-lg-0"
                      role="search"
                      th:action="@{/courses/search}"
                      method="get">

                    <i class="bi bi-search"></i>

                    <input class="form-control"
                           type="search"
                           name="keyword"
                           placeholder="What do you want to learn?">

                    <button class="btn btn-dark" type="submit">
                        Search
                    </button>
                </form>

                <!-- AUTH BUTTONS -->
                <div class="d-flex gap-2 ms-lg-3">
                    <a class="btn btn-outline-dark" th:href="@{/login}">
                        Sign in
                    </a>
                    <a class="btn btn-primary" th:href="@{/register}">
                        Sign up
                    </a>
                </div>

            </div>
        </div>
    </nav>
</header>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
