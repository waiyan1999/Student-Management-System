<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/css :: css}"></head>

<body>

<div th:replace="~{fragment/header :: header}"></div>

<main>
  <section class="section-pad bg-light">
    <div class="container-xxl">

      <div class="row justify-content-center">
        <div class="col-xl-10">

          <article class="course-card bg-white">

            <!-- COURSE IMAGE -->
            <img
              src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1400&q=80"
              alt="Course image"
            />

            <div class="course-body p-4 p-lg-5">

              <!-- ERROR MESSAGE -->
              <div th:if="${errorMessage}" class="alert alert-danger mt-3">
                <span th:text="${errorMessage}"></span>
              </div>

              <!-- COURSE HEADER -->
              <div class="d-flex flex-column flex-lg-row justify-content-between gap-4 mb-4">

                <div>
                  <span class="eyebrow">Course details</span>

                  <h1 class="mb-3" th:text="${course.name}">
                    Course Name
                  </h1>

                  <p class="lead text-muted mb-0"
                     th:text="${course.description}">
                    Course description here
                  </p>
                </div>

                <div class="text-lg-end">
                  <span class="badge text-bg-success mb-2"
                        th:text="${course.status}">
                    Open
                  </span>

                  <div class="fs-2 fw-bold" th:text="'MMK ' + ${course.fee}">
                    0
                  </div>

                  <p class="text-muted mb-0">Course fee</p>
                </div>

              </div>

              <!-- COURSE INFO -->
              <div class="row g-4 mb-4">

                <div class="col-sm-6 col-lg-3">
                  <div class="category-card">
                    <i class="bi bi-grid"></i>
                    <h3>Category</h3>
                    <p th:text="${course.categoryName}"></p>
                  </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                  <div class="category-card">
                    <i class="bi bi-code-slash"></i>
                    <h3>Subcategory</h3>
                    <p th:text="${course.subcategoryName}"></p>
                  </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                  <div class="category-card">
                    <i class="bi bi-bar-chart"></i>
                    <h3>Level</h3>
                    <p th:text="${course.level}"></p>
                  </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                  <div class="category-card">
                    <i class="bi bi-calendar-week"></i>
                    <h3>Duration</h3>
                    <p th:text="${course.duration}"></p>
                  </div>
                </div>

              </div>

              <!-- SCHEDULE TABLE -->
              <h2 class="mb-3">Class Schedule</h2>

              <div class="table-responsive mb-4">
                <table class="table table-hover border">
                  <thead>
                  <tr>
                    <th>Day</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Room</th>
                  </tr>
                  </thead>

                  <tbody>
                  <tr th:each="s : ${schedules}">
                    <td th:text="${#temporals.format(s.date, 'dd-MM-yyyy')}"></td>
                    <td th:text="${#temporals.format(s.startTime,'hh:mm a')}"></td>
                    <td th:text="${#temporals.format(s.endTime,'hh:mm a')}"></td>
                    <td th:text="${s.room}"></td>
                  </tr>
                  </tbody>
                </table>
              </div>

              <!-- TEACHER + ENROLL SECTION -->
              <div class="category-card">

                <i class="bi bi-person-badge"></i>

                <h3>Teacher</h3>
                <p th:text="${course.teacherName}"></p>

                <div class="mt-3">
                  <small class="text-muted d-block">Seats</small>
                  <strong th:text="${course.seatsAvailable} + ' / ' + ${course.seatsTotal}"></strong>
                </div>

                <hr>

                <div class="d-flex justify-content-between">
                  <span>Status</span>
                  <strong th:text="${course.status}"></strong>
                </div>

                <div class="d-flex justify-content-between">
                  <span>Fee</span>
                  <strong th:text="'MMK ' + ${course.fee}"></strong>
                </div>

                <!-- ENROLL BUTTON -->
                <a class="btn btn-primary w-100 mt-3"
                   th:if="${course.seatsAvailable > 0}"
                   th:href="@{/enrollment/show(courseId=${course.id})}">
                  Enroll Now
                </a>

                <button class="btn btn-secondary w-100 mt-3"
                        th:if="${course.seatsAvailable == 0}"
                        disabled>
                  Full
                </button>

              </div>

            </div>
          </article>

        </div>
      </div>

    </div>
  </section>
</main>

<div th:replace="~{fragment/footer :: footer}"></div>
<div th:replace="~{fragment/js :: js}"></div>

</body>
</html>
