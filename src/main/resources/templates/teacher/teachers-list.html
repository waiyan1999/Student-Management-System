<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Teacher List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Teacher List</h2>

    <table class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Photo</th>
            <th>Role ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
            <th>Phone No</th>
            <th>Address</th>
            <th>Date of Birth</th>
            <th>Gender</th>
            <th>Created At</th>
            <th>Status</th>
            <th>Profile</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="teacher : ${teacherList}">

            <td th:text="${teacher.id}"></td>

            <td>
                <img th:src="@{'/'+${teacher.filePath}}"
                     width="70"
                     height="70"
                     class="rounded-circle">
            </td>

            <td th:text="${teacher.roleId}"></td>

            <td th:text="${teacher.name}"></td>

            <td th:text="${teacher.email}"></td>

            <td th:text="${teacher.password}"></td>

            <td th:text="${teacher.phoneNo}"></td>

            <td th:text="${teacher.address}"></td>

            <td th:text="${teacher.dob}"></td>

            <td th:text="${teacher.gender}"></td>

            <td th:text="${teacher.created_at}"></td>

            <td>
                <span th:if="${teacher.isActive==1}" class="badge bg-success">
                    Active
                </span>

                <span th:unless="${teacher.isActive==1}" class="badge bg-danger">
                    Inactive
                </span>
            </td>
             <td> 
             
                <a th:href="@{/users/getbyid(id=${teacher.id})}">Views</a>
             </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
