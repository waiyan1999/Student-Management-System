<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragment/css :: css}"></th:block>
    <title>Course Categories</title>
</head>
<body>

    <th:block th:replace="~{fragment/header :: header}"></th:block>

    <div class="container mt-4">
        <h2 class="mb-4">Course Categories</h2>

        <!-- Flash message -->
        <div th:if="${flashMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${flashMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- ===== ADD NEW CATEGORY ===== -->
        <div class="card mb-4">
            <div class="card-header">Add New Category</div>
            <div class="card-body">
                <form th:action="@{/course-category/create}" th:object="${courseCategory}" method="post">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-8">
                            <label for="name" class="form-label">Category Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Enter category name" required>
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary w-100">Add Category</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- ===== CATEGORY LIST ===== -->
        <div class="card">
            <div class="card-header">All Categories</div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${courseCategoryList}">
                            <td th:text="${cat.id}"></td>
                            <td th:text="${cat.name}"></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-warning"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editModal"
                                        th:data-id="${cat.id}"
                                        th:data-name="${cat.name}">
                                    Edit
                                </button>
                                <a th:href="@{/course-category/delete/{id}(id=${cat.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure you want to delete this category?');">
                                    Delete
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courseCategoryList)}">
                            <td colspan="3" class="text-center text-muted">No categories found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== EDIT MODAL (NO th:object) ===== -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <!-- ✅ No th:object – pure HTML form -->
                <form id="editForm" method="post">
                    <div class="modal-body">
                        <!-- hidden field for ID (optional, but we set action with path variable) -->
                        <input type="hidden" id="editId" name="id" />
                        <div class="mb-3">
                            <label for="editName" class="form-label">Category Name</label>
                            <input type="text" class="form-control" id="editName" name="name" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Update Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragment/footer :: footer}"></th:block>
    <th:block th:replace="~{fragment/js :: js}"></th:block>

    <!-- ===== JavaScript: Populate modal and set dynamic action ===== -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const editModal = document.getElementById('editModal');
            if (editModal) {
                editModal.addEventListener('show.bs.modal', function(event) {
                    const button = event.relatedTarget;
                    const id = button.getAttribute('data-id');
                    const name = button.getAttribute('data-name');

                    // Set values
                    document.getElementById('editId').value = id;
                    document.getElementById('editName').value = name;

                    // Dynamically set the form action to the update endpoint
                    const form = document.getElementById('editForm');
                    form.action = '/course-category/update/' + id;
                });
            }
        });
    </script>

</body>
</html>
